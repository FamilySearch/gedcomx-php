name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    container: php:${{ matrix.php-version }}-cli

    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2', '8.3']

    name: PHP ${{ matrix.php-version }} Tests

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies and PHP extensions
      run: |
        apt-get update
        apt-get install -y git unzip libzip-dev libxml2-dev
        docker-php-ext-install xml zip
        if [ "${{ matrix.php-version }}" = "8.3" ]; then
          pecl install xdebug
          docker-php-ext-enable xdebug
        fi
        php -v
        php -m

    - name: Install Composer
      run: |
        php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
        php composer-setup.php --install-dir=/usr/local/bin --filename=composer
        rm composer-setup.php
        composer --version

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php-version }}-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run test suite
      run: vendor/bin/phpunit

    - name: Generate coverage report
      if: matrix.php-version == '8.3'
      run: vendor/bin/phpunit --coverage-clover build/logs/clover.xml

    - name: Upload coverage to Coveralls
      if: matrix.php-version == '8.3'
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      run: |
        composer global require php-coveralls/php-coveralls
        export PATH="$HOME/.composer/vendor/bin:$PATH"
        php-coveralls --coverage_clover=build/logs/clover.xml --json_path=build/logs/coveralls-upload.json -v
